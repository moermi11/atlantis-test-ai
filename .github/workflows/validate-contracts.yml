name: Contract Validation (Sprint 2 Phase 1)
on: [push, pull_request, workflow_dispatch]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y jq python3-yaml

      - name: Run Validation
        run: |
          mkdir -p out/reports
          chmod +x scripts/validate_contracts_phase1.sh
          bash scripts/validate_contracts_phase1.sh
        continue-on-error: true  # Allows artifact upload even on expected failures

      - name: Upload JSON Report
        uses: actions/upload-artifact@v4
        with:
          name: phase1-validation-report
          path: out/reports/phase1_validation.json

      - name: Print Summary
        run: |
          if [ -f out/reports/phase1_validation.json ]; then
            echo "📄 Validation Report Content:"
            cat out/reports/phase1_validation.json
          fi
          echo "⚠️ Job may show as 'failed'. This is expected during Dry-Run."
