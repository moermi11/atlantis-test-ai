name: Contract Validation (Sprint 2 Phase 1)
on: [push, pull_request, workflow_dispatch]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y jq python3-yaml

      - name: Run Validation
        run: |
          mkdir -p out/reports
          chmod +x scripts/validate_contracts_phase1.sh
          bash scripts/validate_contracts_phase1.sh
        continue-on-error: true

      - name: Print JSON Report Content
        run: cat out/reports/phase1_validation.json

      - name: Upload JSON Report
        uses: actions/upload-artifact@v4
        with:
          name: phase1-validation-report
          path: out/reports/phase1_validation.json
          if-no-files-found: warn
          compression-level: 6
          overwrite: false
          include-hidden-files: false
